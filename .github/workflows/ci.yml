name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR 35 preview CI is scoped to semantic-runtime and MCP release confidence.
  # Legacy compiler/SSR/SSG/Vite/playground lanes are parked until they target semantic-runtime.
  semantic-runtime:
    name: Semantic Runtime Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify submodules
        run: |
          git submodule status --recursive
          test -f aurelia/package.json
          test -f aurelia2-plugins/packages/aurelia2-table/package.json

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PNPM_APPROVE_BUILDS: esbuild

      - name: Build semantic runtime
        run: pnpm --filter @aurelia-ls/semantic-runtime build

      - name: Check public query/type-system contracts
        run: node packages/semantic-runtime/scripts/contract-suite.mjs --route diagnostics --route inquiry --route kernel --route type-system --skip-build

      - name: Check open-seam release contracts
        run: node packages/semantic-runtime/scripts/contract-suite.mjs --route evaluation --route di --domain 'mcp;api;open-seams;reason-kinds' --skip-build

  mcp-preview:
    name: MCP Preview Pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify submodules
        run: |
          git submodule status --recursive
          test -f aurelia/package.json
          test -f aurelia2-plugins/packages/aurelia2-table/package.json

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PNPM_APPROVE_BUILDS: esbuild

      - name: Smoke Atlas source maps
        run: pnpm --filter @aurelia-ls/atlas smoke

      - name: Probe source stdio MCP
        run: pnpm --filter @aurelia-ls/mcp probe:stdio

      - name: Check MCP surface contracts
        run: pnpm --filter @aurelia-ls/mcp contract:adversarial-surface

      - name: Check MCP continuation pass-through
        run: pnpm --filter @aurelia-ls/mcp contract:continuation-pass-through

      - name: Pack MCP preview tarball
        run: pnpm --filter @aurelia-ls/mcp release:pack

      - name: Probe release tarball
        run: pnpm --filter @aurelia-ls/mcp probe:release-tarball

      - name: Probe project-local install
        run: pnpm --filter @aurelia-ls/mcp probe:project-local-install

      - name: Upload MCP preview tarball
        uses: actions/upload-artifact@v4
        with:
          name: aurelia-ls-mcp-preview
          path: packages/mcp/.release/*.tgz
          if-no-files-found: error
          include-hidden-files: true
