<section class="task-section" data-au-role="app-section">
  <form submit.trigger="create()" class="task-section__form">
    <div>
      <label for="title-field">Title</label>
      <input value.bind="title" id="title-field">
    </div>
    <div>
      <label for="done-field">Done</label>
      <input type="checkbox" checked.bind="done" id="done-field">
    </div>
    <button type="submit">Create</button>
  </form>
  <section promise.bind="taskItemsPromise" class="task-section__status">
    <p pending class="task-section__pending">Loading tasks...</p>
    <template then="loadedTaskItems">
      <p if.bind="loadedTaskItems.length === 0" class="task-section__empty">No tasks yet.</p>
      <template else>
        <table class="task-section__table">
          <thead>
            <tr>
              <th>Task</th>
              <th>Done</th>
            </tr>
          </thead>
          <tbody>
            <tr repeat.for="taskItem of loadedTaskItems">
              <td>${taskItem.title}</td>
              <td>
                <input type="checkbox" checked.to-view="taskItem.done" disabled aria-label="Done">
              </td>
            </tr>
          </tbody>
        </table>
      </template>
    </template>
    <p catch="error" class="task-section__error">Could not load tasks.</p>
  </section>
</section>
