<section class="task-review-workflow" data-au-role="app-section">
  <form submit.trigger="create()" class="task-review-workflow__form">
    <div>
      <label for="title-field">Title</label>
      <input value.bind="title" id="title-field">
    </div>
    <div>
      <label for="done-field">Done</label>
      <input type="checkbox" checked.bind="done" id="done-field">
    </div>
    <div>
      <label for="task-assignee-select">Assignee</label>
      <select value.bind="assigneeId" id="task-assignee-select">
        <option repeat.for="contact of contacts" value.bind="contact.contactId">${contact.fullName}</option>
      </select>
    </div>
    <div>
      <label for="task-reviewers-select">Reviewers</label>
      <select multiple value.bind="reviewerIds" id="task-reviewers-select">
        <option repeat.for="contact of contacts" value.bind="contact.contactId">${contact.fullName}</option>
      </select>
    </div>
    <button type="submit">Create task</button>
  </form>
  <p if.bind="createStatusMessage" role="status" id="task-create-status" class="task-review-workflow__status">${createStatusMessage}</p>
  <section promise.bind="taskItemsPromise" class="task-review-workflow__status-region">
    <p pending class="task-review-workflow__pending">Loading tasks...</p>
    <template then="loadedTaskItems">
      <p if.bind="loadedTaskItems.length === 0" class="task-review-workflow__empty">No tasks yet.</p>
      <template else>
        <table class="task-review-workflow__table">
          <thead>
            <tr>
              <th>Task</th>
              <th>Assignee</th>
              <th>Reviewers</th>
              <th>Done</th>
            </tr>
          </thead>
          <tbody>
            <tr repeat.for="taskItem of loadedTaskItems" class="task-review-workflow__row">
              <td>${taskItem.title}</td>
              <td>${assigneeLabelForTaskItem(taskItem)}</td>
              <td>${reviewersLabelForTaskItem(taskItem)}</td>
              <td>
                <input type="checkbox" checked.to-view="taskItem.done" disabled aria-label="Done">
              </td>
            </tr>
          </tbody>
        </table>
      </template>
    </template>
    <p catch="error" class="task-review-workflow__error">Could not load tasks.</p>
  </section>
</section>
