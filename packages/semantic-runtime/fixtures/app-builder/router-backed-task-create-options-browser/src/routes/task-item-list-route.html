<section>
  <h2>Tasks</h2>
  <form submit.trigger="create()">
    <div>
      <label for="title-field">Title</label>
      <input value.bind="title" id="title-field">
    </div>
    <div>
      <label for="priority-field">Priority</label>
      <select value.bind="priority" id="priority-field">
        <option repeat.for="option of state.priorityOptions" value.bind="option.value">${option.title}</option>
      </select>
    </div>
    <div>
      <label for="labels-field">Labels</label>
      <select multiple value.bind="labels" id="labels-field">
        <option repeat.for="option of state.labelOptions" value.bind="option.value">${option.title}</option>
      </select>
    </div>
    <button type="submit">Create task</button>
  </form>
  <p if.bind="state.taskItems.length === 0">No tasks yet.</p>
  <ul else>
    <li repeat.for="taskItem of state.taskItems">
      <span>${taskItem.title}</span>
      <a load="route: task-item-detail; params.bind: { taskId: taskItem.id }">Open</a>
    </li>
  </ul>
  <au-viewport name="detail"></au-viewport>
</section>
