<section>
  <h2>Tasks</h2>
  <form submit.trigger="create()">
    <div>
      <label for="title-field">Title</label>
      <input value.bind="title" id="title-field">
    </div>
    <div>
      <label for="assignee-id-field">Assignee</label>
      <select value.bind="assigneeId" id="assignee-id-field">
        <option repeat.for="contactEntry of state.contacts" value.bind="contactEntry.contactId">${contactEntry.fullName}</option>
      </select>
    </div>
    <div>
      <label for="reviewer-ids-field">Reviewers</label>
      <select multiple value.bind="reviewerIds" id="reviewer-ids-field">
        <option repeat.for="contactEntry of state.contacts" value.bind="contactEntry.contactId">${contactEntry.fullName}</option>
      </select>
    </div>
    <button type="submit">Create task</button>
  </form>
  <p if.bind="state.taskItems.length === 0">No tasks yet.</p>
  <ul else>
    <li repeat.for="taskItem of state.taskItems">
      <span>${taskItem.title}</span>
      <span>Assignee: ${state.assigneeLabelForTaskItem(taskItem)}</span>
      <span>Reviewers: ${state.reviewersLabelForTaskItem(taskItem)}</span>
      <a load="route: task-item-detail; params.bind: { taskId: taskItem.id }">Open</a>
    </li>
  </ul>
  <au-viewport name="detail"></au-viewport>
</section>
