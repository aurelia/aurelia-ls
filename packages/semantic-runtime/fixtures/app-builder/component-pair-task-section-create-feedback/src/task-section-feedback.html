<section class="task-section" data-au-role="app-section">
  <form submit.trigger="create()" class="task-section__form">
    <div>
      <label for="title-field">Title</label>
      <input value.bind="title" id="title-field">
    </div>
    <div>
      <label for="done-field">Done</label>
      <input type="checkbox" checked.bind="done" id="done-field">
    </div>
    <button type="submit">Create</button>
  </form>
  <p if.bind="actionStatusMessage" role="status" id="task-action-status" class="task-section__action-status">${actionStatusMessage}</p>
  <p if.bind="taskItems.length === 0" class="task-section__empty">No tasks yet.</p>
  <table else class="task-section__table">
    <thead>
      <tr>
        <th>Task</th>
        <th>Done</th>
      </tr>
    </thead>
    <tbody>
      <tr repeat.for="taskItem of taskItems">
        <td>${taskItem.title}</td>
        <td>
          <input type="checkbox" checked.to-view="taskItem.done" disabled aria-label="Done">
        </td>
      </tr>
    </tbody>
  </table>
</section>
