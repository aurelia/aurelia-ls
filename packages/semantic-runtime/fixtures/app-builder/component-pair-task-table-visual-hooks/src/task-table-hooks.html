<p if.bind="taskItems.length === 0" class="task-table__empty" data-state="empty">No tasks yet.</p>
<table else class="task-table" data-au-role="collection-table">
  <thead>
    <tr>
      <th class="task-table__header" data-field="title">Title</th>
      <th>Done</th>
    </tr>
  </thead>
  <tbody>
    <tr repeat.for="taskItem of taskItems" class="task-table__row" data-row="task">
      <td>${taskItem.title}</td>
      <td class="task-table__cell" data-field="done">
        <input type="checkbox" checked.to-view="taskItem.done" disabled aria-label="Done">
      </td>
    </tr>
  </tbody>
</table>
