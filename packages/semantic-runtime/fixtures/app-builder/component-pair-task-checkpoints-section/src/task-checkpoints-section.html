<section class="task-checkpoints" data-au-role="app-section">
  <p if.bind="taskItems.length === 0" class="task-checkpoints__empty">No tasks yet.</p>
  <table else class="task-checkpoints__table">
    <thead>
      <tr>
        <th>Task</th>
        <th>Checkpoints</th>
        <th>Done</th>
      </tr>
    </thead>
    <tbody>
      <tr repeat.for="taskItem of taskItems">
        <td>${taskItem.title}</td>
        <td>${checkpointsLabelForTaskItem(taskItem)}</td>
        <td>
          <input type="checkbox" checked.to-view="taskItem.done" disabled aria-label="Done">
        </td>
      </tr>
    </tbody>
  </table>
</section>
