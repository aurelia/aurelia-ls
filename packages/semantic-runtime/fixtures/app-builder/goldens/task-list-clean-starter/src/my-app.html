<main>
  <h1>Task List</h1>

  <form submit.trigger="state.addTask()">
    <label>
      <span>New task</span>
      <input value.bind="state.newTaskTitle" autocomplete="off">
    </label>
    <button type="submit" disabled.bind="!state.canAddTask">Add</button>
  </form>

  <p if.bind="state.tasks.length === 0">No tasks yet.</p>

  <ul>
    <li repeat.for="task of state.tasks" class.done.bind="task.done">
      <label>
        <input type="checkbox" checked.bind="task.done">
        <span>${task.title}</span>
      </label>
      <small>${task.statusLabel}</small>
    </li>
  </ul>

  <footer if.bind="state.tasks.length > 0">
    <span>${state.remainingCount} remaining</span>
    <button type="button" click.trigger="state.clearCompletedTasks()" disabled.bind="state.completedCount === 0">Clear completed</button>
  </footer>
</main>
