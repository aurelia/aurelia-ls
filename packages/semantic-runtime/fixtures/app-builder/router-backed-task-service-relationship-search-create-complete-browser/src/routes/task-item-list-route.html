<section>
  <h2>Tasks</h2>
  <div>
    <label for="task-relationship-search-query">Search task relationships</label>
    <input type="search" value.bind="taskRelationshipTitleQuery" id="task-relationship-search-query">
  </div>
  <button type="button" click.trigger="searchTaskRelationships()">Search task relationships</button>
  <p if.bind="searchStatusMessage" role="status" id="task-relationship-search-status">${searchStatusMessage}</p>
  <button type="button" click.trigger="clearTaskRelationshipSearch()">Clear search</button>
  <p if.bind="clearSearchStatusMessage" role="status" id="task-relationship-clear-search-status">${clearSearchStatusMessage}</p>
  <form submit.trigger="create()">
    <div>
      <label for="title-field">Title</label>
      <input value.bind="title" id="title-field">
    </div>
    <div>
      <label for="done-field">Done</label>
      <input type="checkbox" checked.bind="done" id="done-field">
    </div>
    <div>
      <label for="assignee-id-field">Assignee</label>
      <select value.bind="assigneeId" id="assignee-id-field">
        <option repeat.for="contactEntry of state.contacts" value.bind="contactEntry.contactId">${contactEntry.fullName}</option>
      </select>
    </div>
    <div>
      <label for="reviewer-ids-field">Reviewers</label>
      <select multiple value.bind="reviewerIds" id="reviewer-ids-field">
        <option repeat.for="contactEntry of state.contacts" value.bind="contactEntry.contactId">${contactEntry.fullName}</option>
      </select>
    </div>
    <button type="submit">Create task</button>
  </form>
  <p if.bind="createStatusMessage" role="status" id="task-relationship-create-status">${createStatusMessage}</p>
  <section promise.bind="taskItemsPromise">
    <p pending>Loading tasks...</p>
    <template then="loadedTaskItems">
      <p if.bind="loadedTaskItems.length === 0">No tasks yet.</p>
      <table else>
        <thead>
          <tr>
            <th>Task</th>
            <th>Assignee</th>
            <th>Reviewers</th>
            <th>Done</th>
            <th>Complete</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr repeat.for="taskItem of loadedTaskItems">
            <td>${taskItem.title}</td>
            <td>${state.assigneeLabelForTaskItem(taskItem)}</td>
            <td>${state.reviewersLabelForTaskItem(taskItem)}</td>
            <td>${taskItem.done ? 'Done' : 'Open'}</td>
            <td>
              <button type="button" click.trigger="complete(taskItem)">Complete</button>
            </td>
            <td>
              <a load="route: task-item-detail; params.bind: { taskId: taskItem.id }">Open</a>
            </td>
          </tr>
        </tbody>
      </table>
    </template>
    <p catch>Could not load tasks.</p>
  </section>
  <au-viewport name="detail"></au-viewport>
</section>
