<section>
  <a load="../">Back</a>
  <section promise.bind="reviewItemPromise">
    <p pending>Loading review...</p>
    <template then="reviewItem">
      <article if.bind="reviewItem">
        <section>
          <h2>${reviewItem.title}</h2>
          <p>
            Done:
            <input type="checkbox" checked.to-view="reviewItem.done" disabled aria-label="Done">
          </p>
          <p>Reviewer: ${state.reviewerLabelForReviewItem(reviewItem)}</p>
        </section>
      </article>
      <p else>No review found for this route.</p>
    </template>
    <p catch>Could not load review.</p>
  </section>
</section>
