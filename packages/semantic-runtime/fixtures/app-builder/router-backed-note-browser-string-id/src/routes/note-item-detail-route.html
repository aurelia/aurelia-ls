<section>
  <a load="../">Back</a>
  <article if.bind="noteItem">
    <section>
      <h2>${noteItem.title}</h2>
      <p>
        Archived:
        <input type="checkbox" checked.to-view="noteItem.archived" disabled aria-label="Archived">
      </p>
    </section>
  </article>
  <p else>No note found for this route.</p>
</section>
