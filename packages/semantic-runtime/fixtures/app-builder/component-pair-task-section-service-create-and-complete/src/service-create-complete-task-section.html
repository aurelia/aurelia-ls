<section class="service-create-complete-task-section">
  <form submit.trigger="create()" class="service-create-complete-task-section__form">
    <div>
      <label for="title-field">Title</label>
      <input value.bind="title" id="title-field">
    </div>
    <div>
      <label for="done-field">Done</label>
      <input type="checkbox" checked.bind="done" id="done-field">
    </div>
    <button type="submit">Create task</button>
  </form>
  <p if.bind="createStatusMessage" role="status" id="task-create-status">${createStatusMessage}</p>
  <p if.bind="completeStatusMessage" role="status" id="task-complete-status">${completeStatusMessage}</p>
  <section promise.bind="taskItemsPromise" class="service-create-complete-task-section__status">
    <p pending>Loading tasks...</p>
    <template then="loadedTaskItems">
      <p if.bind="loadedTaskItems.length === 0">No tasks yet.</p>
      <template else>
        <table class="service-create-complete-task-section__table" data-au-role="service-create-complete-table">
          <thead>
            <tr>
              <th>Task</th>
              <th>Done</th>
              <th>Complete</th>
            </tr>
          </thead>
          <tbody>
            <tr repeat.for="taskItem of loadedTaskItems" class="service-create-complete-task-section__row">
              <td>${taskItem.title}</td>
              <td>
                <input type="checkbox" checked.to-view="taskItem.done" disabled aria-label="Done">
              </td>
              <td>
                <button type="button" click.trigger="complete(taskItem)">Complete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </template>
    </template>
    <p catch="error">Could not load tasks.</p>
  </section>
</section>
