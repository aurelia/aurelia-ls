<section class="service-complete-task-table">
  <section promise.bind="taskItemsPromise">
    <p pending>Loading tasks...</p>
    <template then="loadedTaskItems">
      <p if.bind="loadedTaskItems.length === 0">No tasks yet.</p>
      <template else>
        <table class="service-complete-task-table__table" data-au-role="service-complete-table">
          <thead>
            <tr>
              <th>Task</th>
              <th>Done</th>
              <th>Complete</th>
            </tr>
          </thead>
          <tbody>
            <tr repeat.for="taskItem of loadedTaskItems" class="service-complete-task-table__row">
              <td>${taskItem.title}</td>
              <td>
                <input type="checkbox" checked.to-view="taskItem.done" disabled aria-label="Done">
              </td>
              <td>
                <button type="button" click.trigger="complete(taskItem)">Complete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </template>
    </template>
    <p catch="error">Could not load tasks.</p>
  </section>
</section>
