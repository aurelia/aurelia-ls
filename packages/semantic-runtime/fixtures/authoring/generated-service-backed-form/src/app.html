<main>
  <h1>Service Request</h1>
  <label for="request-selector">Service Request</label>
  <select id="request-selector" value.bind="state.selectedRequestId">
    <option repeat.for="requestId of state.requestIds" model.bind="requestId">${requestId}</option>
  </select>

  <service-backed-form request-id.bind="state.selectedRequestId"></service-backed-form>

  <p>Submissions: ${state.submittedCount}</p>
</main>
