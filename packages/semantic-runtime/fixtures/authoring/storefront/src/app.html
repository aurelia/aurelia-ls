<main>
  <header>
    <h1>Harbor & Field</h1>
    <p>${state.productCount} seasonal goods ready to ship</p>
    <p if.bind="state.catalog.isLoading">Refreshing catalog...</p>
    <section promise.bind="launchNote">
      <p pending>Checking fulfillment note...</p>
      <p then="note">${note}</p>
      <p catch="reason">${reason}</p>
    </section>
    <cart-summary
      count.bind="state.cart.count"
      data-cart-count.bind="state.cart.count"
      aria-label.attr="'Cart contains ' + state.cart.count + ' items'">
    </cart-summary>
  </header>

  <product-list></product-list>
  <checkout-form></checkout-form>
</main>
