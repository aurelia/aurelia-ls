<section
  aria-labelledby="checkout-heading"
  class="checkout ${statusToneClass}"
  class.bind="checkoutPanelClasses"
  style="border-color: ${statusAccentColor};"
  style.bind="checkoutPanelStyles"
  data-checkout-state.bind="checkoutStateDataId"
  aria-invalid.attr="ariaInvalid"
  --checkout-accent.style="statusAccentColor"
  background-color.style="statusBackgroundColor">
  <h2 id="checkout-heading">Request a quote</h2>

  <aside
    class.bind="fulfillmentClassTokens"
    style.bind="fulfillmentStyles"
    data-fulfillment.attr="state.checkout.fulfillmentMethod"
    --fulfillment-accent.style="statusAccentColor"
    border-inline-start-width.style="progressStrokeWidth">
    <span
      checkout-ready,checkout-waiting.class="!state.checkout.canSubmit"
      color.style="statusTextColor"
      text-decoration.style="statusDecoration"
      data-submit-count.attr="submitCountText">
      ${progressLabel}
    </span>
    <svg
      role="img"
      viewBox="0 0 100 8"
      aria-label.attr="progressLabel">
      <rect width="100" height="8" rx="4" fill="#ece7df"></rect>
      <rect
        height="8"
        rx="4"
        width.attr="progressWidth"
        stroke-width.bind="progressStrokeWidth"
        fill.attr="statusAccentColor">
      </rect>
    </svg>
  </aside>

  <form element.ref="checkoutFormElement" submit.trigger="requestQuote()">
    <field-shell
      input-id="checkout-email"
      label="Email"
      type="email"
      value.bind="state.checkout.email"
      autocomplete="email"
      aria-describedby="checkout-heading"
      data-field-kind="email"
      disabled.bind="false">
    </field-shell>

    <label for="fulfillment-method">Fulfillment</label>
    <select id="fulfillment-method" value.bind="state.checkout.fulfillmentMethod">
      <option model.bind="shipFulfillmentMethod">Ship the order</option>
      <option model.bind="pickupFulfillmentMethod">Pick up in store</option>
    </select>

    <fieldset>
      <legend>Contact preference</legend>
      <label>
        <input
          type="radio"
          name="contact-preference"
          model.bind="emailContactPreference"
          checked.bind="state.checkout.contactPreference">
        Email
      </label>
      <label>
        <input
          type="radio"
          name="contact-preference"
          model.bind="phoneContactPreference"
          checked.bind="state.checkout.contactPreference">
        Phone
      </label>
    </fieldset>

    <fieldset>
      <legend>Add-ons</legend>
      <label>
        <input
          type="checkbox"
          model.bind="installationAddOn"
          checked.bind="state.checkout.selectedAddOns">
        Installation help
      </label>
      <label>
        <input
          type="checkbox"
          model.bind="supportAddOn"
          checked.bind="state.checkout.selectedAddOns">
        Priority support
      </label>
    </fieldset>

    <label for="checkout-addon-select">Service bundle</label>
    <select
      id="checkout-addon-select"
      multiple
      value.bind="state.checkout.selectedAddOns">
      <option model.bind="installationAddOn">Installation help</option>
      <option model.bind="supportAddOn">Priority support</option>
    </select>

    <field-shell
      if.bind="state.checkout.requiresPostalCode"
      input-id="postal-code"
      label="Postal code"
      value.bind="state.checkout.postalCode"
      autocomplete="postal-code">
    </field-shell>

    <label>
      <input
        type="checkbox"
        checked.bind="state.checkout.giftWrap"
        accent-color.style="statusAccentColor">
      Add gift wrapping
    </label>

    <label for="delivery-notes">Delivery notes</label>
    <textarea
      id="delivery-notes"
      value.bind="state.checkout.instructions"
      rows="3">
    </textarea>

    <button
      type="submit"
      disabled.bind="!state.checkout.canSubmit"
      needs-details.class="!state.checkout.canSubmit"
      padding.style="submitButtonPadding"
      outline.style="submitButtonOutline"
      data-state.attr="checkoutStateName">
      Request quote
    </button>
    <p if.bind="state.checkout.statusMessage != ''">${state.checkout.statusMessage}</p>
  </form>
</section>
