<section>
  <a load="../">Back</a>
  <section promise.bind="milestonePromise">
    <p pending>Loading milestone...</p>
    <template then="milestone">
      <article if.bind="milestone">
        <section>
          <h2>${milestone.title}</h2>
          <p>Target Date: ${milestone.targetDateLabel}</p>
        </section>
      </article>
      <p else>No milestone found for this route.</p>
    </template>
    <p catch>Could not load milestone.</p>
  </section>
</section>
