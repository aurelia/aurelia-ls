<section>
  <h2>Projects</h2>
  <section promise.bind="projectsPromise">
    <p pending>Loading projects...</p>
    <template then="loadedProjects">
      <p if.bind="loadedProjects.length === 0">No projects yet.</p>
      <ul else>
        <li repeat.for="project of loadedProjects">
          <span>${project.name}</span>
          <a load="route: project-detail; params.bind: { projectId: project.id }">Open project</a>
        </li>
      </ul>
    </template>
    <p catch>Could not load projects.</p>
  </section>
  <au-viewport name="detail"></au-viewport>
</section>
