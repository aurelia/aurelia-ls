<section>
  <h1>${title}</h1>
  <ul>
    <li repeat.for="item of unresolvedRows">
      ${item.label}
      ${item.status}
    </li>
  </ul>
  <ul>
    <li repeat.for="typedRow of anyRows">
      ${typedRow.name}
    </li>
  </ul>
  <p>${untypedRow.label}</p>
  <p>${makeUntypedRow().label}</p>
  <p>${indexedRow.status}</p>
  <p>${title.missing}</p>
</section>
