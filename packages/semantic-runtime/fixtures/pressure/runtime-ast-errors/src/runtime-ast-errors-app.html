<input value.bind="label()">
<input value.bind="(label)()">
<input value.bind="settings.label()">
<input value.bind="label`tagged`">
<input value.bind="$host">
<input value.to-view="nullOwner.name">
<input value.to-view="nullRecord['name']">
<input value.bind="nullOwner.name">
<input value.to-view="counter++">
<input value.bind="label | missingConverter">
<input value.bind="label & missingBehavior">
<input value.bind="label & throttle & throttle">
<div repeat.for="letter of label">${letter}</div>
<div repeat.for="row of primitiveRows; key.one-time: id">${row}</div>
<div repeat.for="row of primitiveRows; contextual.two-way: true">${row}</div>
<div repeat.for="row of primitiveRows; previous: row">${row}</div>
<div repeat.for="[first] of primitiveRows">${first}</div>
<div repeat.for="[head, ...tail] of arrayLikeRows">${head}</div>
