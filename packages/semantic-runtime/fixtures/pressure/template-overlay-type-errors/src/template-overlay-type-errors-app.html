<template>
  <ul>
    <li repeat.for="item of items">
      ${item.missingLabel}
    </li>
    <li repeat.for="unknownItem of unknownItems">
      ${unknownItem.label}
    </li>
  </ul>

  <section if.bind="selectedItem">
    ${selectedItem.missingStatus}
  </section>

  <p>${maybeItem.label}</p>

  <button type="button" click.trigger="submit(selectedItem)">
    Submit
  </button>

  <button type="button" click.trigger="submit('not-an-item')">
    Submit invalid
  </button>

  <button type="button" click.trigger="submit(selectedItem, selectedItem)">
    Submit twice
  </button>
</template>
