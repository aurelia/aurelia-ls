schema_version: v0alpha1
packet_kind: fixture
fixture_id: exported-custom-element-activation-gap
title: Exported Custom Element With Activation Gap
intent: >
  Pressure the split between export identity closure and current-world activity
  when an exported custom element is registered into the visible Aurelia world
  but still has an unsatisfied activation dependency.
frameworks_expected:
  - typescript
  - aurelia
feature_tags:
  - export-lens
  - resource-definition
  - custom-element
  - activation-gap
  - compile-time-di
workspace_root: ./src
source_files:
  - src/lazy-panel.ts
  - src/lazy-panel.html
  - src/index.ts
  - src/app-root.ts
  - src/app-root.html
known_subjects:
  - subject_id: lazy-panel-export
    label: LazyPanel export
    source: src/index.ts
    kind_hint: custom-element
  - subject_id: lazy-panel-class
    label: LazyPanel class declaration
    source: src/lazy-panel.ts
    kind_hint: custom-element
  - subject_id: iloadstate-export
    label: ILoadState export
    source: src/index.ts
    kind_hint: interface-symbol-key
known_world_contributors:
  - contributor_id: app-root-dependencies
    summary: AppRoot contributes LazyPanel into the local Aurelia world.
  - contributor_id: app-root-template
    summary: AppRoot template actually spends the lazy-panel tag.
known_open_boundaries:
  - boundary_id: missing-iloadstate-registration
    summary: >
      LazyPanel constructor requires ILoadState, but this fixture never
      registers an implementation for that interface key.
    likely_outcome: open
query_seeds:
  - query_id: what-does-lazypanel-export-point-to
    human_question: What does the `LazyPanel` export point to?
  - query_id: is-lazypanel-current-world-active
    human_question: Is the `LazyPanel` export actually current-world active?
  - query_id: what-is-blocking-lazypanel-activation
    human_question: What is blocking the `LazyPanel` export from becoming active?
