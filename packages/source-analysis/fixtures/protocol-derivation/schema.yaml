schema_version: v0alpha1
title: Protocol Derivation Fixture Packet Schema
status: provisional

packet_families:
  fixture_packet:
    required_fields:
      - schema_version
      - packet_kind
      - fixture_id
      - title
      - intent
      - frameworks_expected
      - feature_tags
      - workspace_root
      - source_files
      - known_subjects
      - query_seeds
    field_notes:
      schema_version: Packet-local schema version.
      packet_kind: Must be fixture.
      fixture_id: Stable fixture identifier.
      title: Short human-readable fixture name.
      intent: Why this fixture exists and what pressure it is meant to create.
      frameworks_expected: Semantic layers expected to auto-detect.
      feature_tags: Compact machine tags for grouping.
      workspace_root: Relative root of the fixture workspace.
      source_files: Files that form the fixture workspace.
      known_subjects: Named subjects that scenarios may target.
      known_world_contributors: Optional consulted-world contributors.
      known_open_boundaries: Optional open-state hints already known to the fixture author.
      mutations: Optional derived-state mutations for retreat and change-pressure scenarios.
      query_seeds: Suggested initial questions to derive from this fixture.

  scenario_packet:
    required_fields:
      - schema_version
      - packet_kind
      - scenario_id
      - fixture_id
      - title
      - human_question
      - selector_seed
      - operation
      - expected_shape
    field_notes:
      schema_version: Packet-local schema version.
      packet_kind: Must be scenario.
      scenario_id: Stable scenario identifier.
      fixture_id: Foreign key to one fixture packet.
      title: Short human-readable scenario name.
      human_question: Real caller-shaped question, not evaluator jargon.
      fixture_state: Optional state selector. Use `base` or `after:<mutation-id>`.
      selector_seed: Initial selector hypothesis.
      operation: Initial read-kernel operation family.
      aspect: Optional aspect seed.
      expected_shape: Expected answer-shape guidance, not yet a full golden payload.
      notes: Optional author notes about why this scenario matters.

shared_vocabulary:
  framework_ids:
    - typescript
    - aurelia
  selector_seed_kinds:
    - export-locator
    - file-locator
    - symbol-name
    - identity-handle
    - anchor-handle
  expected_shape_fields:
    dominant_outcomes:
      summary: Likely primary outcome tags under honest closure.
    basis_kinds:
      summary: Basis kinds that should probably appear.
    continuation_kinds:
      summary: Continuation kinds that would be useful if the scenario stops early.
    identity_expectation:
      summary: Whether identity should emit, and at what rough strength.
    anchor_expectation:
      summary: Whether anchor should emit, and at what rough strength.
  fixture_state_examples:
    - base
    - after:some-mutation-id

authoring_rules:
  - Human questions should sound like something a real caller might ask.
  - Aurelia should be treated as auto-detected when the fixture contains Aurelia semantics.
  - Fixture packets should prefer small concrete workspaces over large synthetic apps.
  - Mutation scenarios should pin a fixture_state instead of implying change only in prose.
  - Scenario packets should describe expected answer shape, not prescribe exact renderer prose.
