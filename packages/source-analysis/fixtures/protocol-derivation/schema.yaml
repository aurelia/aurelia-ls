schema_version: v0alpha1
title: Protocol Derivation Fixture Packet Schema
status: provisional

packet_families:
  fixture_packet:
    required_fields:
      - schema_version
      - packet_kind
      - fixture_id
      - title
      - intent
      - frameworks_expected
      - feature_tags
      - workspace_root
      - source_files
      - known_subjects
      - query_seeds
    field_notes:
      schema_version: Packet-local schema version.
      packet_kind: Must be fixture.
      fixture_id: Stable fixture identifier.
      title: Short human-readable fixture name.
      intent: Why this fixture exists and what pressure it is meant to create.
      frameworks_expected: Semantic layers expected to auto-detect.
      feature_tags: Compact machine tags for grouping.
      workspace_root: Relative root of the fixture workspace.
      source_files: Files that form the fixture workspace.
      detection_signals: Optional structured evidence for why framework auto-detection should trigger.
      known_subjects: Named subjects that scenarios may target.
      known_world_contributors: Optional consulted-world contributors.
      known_open_boundaries: Optional open-state hints already known to the fixture author.
      mutations: Optional derived-state mutations for retreat and change-pressure scenarios.
      query_seeds: Suggested initial questions to derive from this fixture.

  scenario_packet:
    required_fields:
      - schema_version
      - packet_kind
      - scenario_id
      - fixture_id
      - title
      - human_question
      - selector_seed
      - operation
      - expected_consulted_world
      - expected_shape
    field_notes:
      schema_version: Packet-local schema version.
      packet_kind: Must be scenario.
      scenario_id: Stable scenario identifier.
      fixture_id: Foreign key to one fixture packet.
      title: Short human-readable scenario name.
      human_question: Real caller-shaped question, not evaluator jargon.
      fixture_state: Optional state selector. Use `base` or `after:<mutation-id>`.
      selector_seed: Initial selector hypothesis.
      operation: Initial read-kernel operation family.
      aspect: Optional aspect seed.
      expected_consulted_world: Expected semantic world and lookup-regime burden for this scenario.
      expected_shape: Expected answer-shape guidance, not yet a full golden payload.
      relational_expectation: Optional baseline relationship for mutation-sensitive outcomes such as `withdrawn`.
      notes: Optional author notes about why this scenario matters.

shared_vocabulary:
  framework_ids:
    - typescript
    - aurelia
  trust_kinds:
    - grounded
    - qualified
    - frontier
    - unavailable
  kernel_continuation_kinds:
    - narrow
    - broaden
    - reroute
    - tighten-posture
    - switch-world
    - strengthen-evidence
  selector_seed_kinds:
    - export-locator
    - file-locator
    - symbol-name
    - identity-handle
    - anchor-handle
  expected_shape_fields:
    dominant_outcomes:
      summary: Likely primary outcome tags under honest closure.
    dominant_trust_kinds:
      summary: Likely trust kinds under honest closure. Keep this separate from outcome tags.
    basis_kinds:
      summary: Basis kinds that should probably appear.
    continuation_kinds:
      summary: Kernel continuation kinds that would be useful if the scenario stops early.
    followup_queries:
      summary: Scenario-specific follow-up query seeds. Keep these separate from kernel continuation kinds.
    identity_expectation:
      summary: Structured identity expectation such as emit, uniqueness floor, scheme hint, and strength.
    anchor_expectation:
      summary: Structured anchor expectation such as emit, scheme hint, and strength.
  consulted_world_fields:
    semantic_world:
      summary: Which semantic world the authority is expected to spend.
    lookup_regime:
      summary: Which lookup or consultation regime should dominate the derivation.
    summary:
      summary: Short human-readable explanation of that world choice.
  relational_expectation_fields:
    baseline_fixture_state:
      summary: Prior fixture state against which relational outcomes should be judged.
    expected_change_kind:
      summary: The kind of change being asserted across states.
    changed_claim_summary:
      summary: Short summary of what claim should change across the relation.
  identity_expectation_fields:
    emit:
      summary: Whether identity should emit (`expected`, `optional`, or `absent`).
    minimum_uniqueness:
      summary: Minimum honest uniqueness scope if identity emits.
    scheme_hint:
      summary: Likely identity scheme if one emits.
    strength:
      summary: Rough identity strength such as `strong`, `moderate`, or `weak`.
    summary:
      summary: Optional clarification about why that identity posture is honest.
  anchor_expectation_fields:
    emit:
      summary: Whether anchor should emit (`expected`, `optional`, or `absent`).
    scheme_hint:
      summary: Likely anchor scheme if one emits.
    strength:
      summary: Rough anchor strength such as `strong`, `moderate`, or `weak`.
    reread_hint:
      summary: Whether a reread hint is expected alongside the anchor.
    summary:
      summary: Optional clarification about why that anchor posture is honest.
  fixture_state_examples:
    - base
    - after:some-mutation-id

authoring_rules:
  - Human questions should sound like something a real caller might ask.
  - Aurelia should be treated as auto-detected when the fixture contains Aurelia semantics.
  - Fixture packets should prefer small concrete workspaces over large synthetic apps.
  - Keep outcome and trust vocabulary in separate fields.
  - Keep kernel continuation kinds separate from scenario-specific follow-up query seeds.
  - Make expected semantic world and lookup regime explicit when the burden depends on them.
  - Mutation scenarios should pin a fixture_state instead of implying change only in prose.
  - `withdrawn` scenarios should also pin a baseline relation rather than relying on mutation prose alone.
  - Scenario packets should describe expected answer shape, not prescribe exact renderer prose.
