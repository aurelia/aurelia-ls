schema_version: v0alpha1
title: Protocol Derivation Vocabulary Registry
status: provisional

purpose: >
  Lightweight registry for current packet and derivation leaf names that are
  already being spent across scenarios. This is meant to reduce silent vocab
  drift without freezing the protocol kernel too early.

semantic_world_ids:
  - world_id: declaration-world
    summary: Export/declaration-adjacent semantic world used for identity-oriented reads.
  - world_id: current-world
    summary: Constructed current Aurelia world used for activity and admission burdens.
  - world_id: consulted-world
    summary: Consulted declaration or configuration world used for world-shaping burdens.
  - world_id: compile-time-di
    summary: Compile-time DI semantic world used for key-space and registration burdens.

lookup_regime_ids:
  - regime_id: direct-export
    summary: Resolve an export through one direct export edge.
  - regime_id: barrel-reexport-chain
    summary: Resolve an export through a barrel or re-export chain.
  - regime_id: direct-export-key-resolution
    summary: Resolve an exported compile-time DI key surface directly from export closure.
  - regime_id: exported-registration-bridge
    summary: Trace how an export feeds a registration or admission bridge.
  - regime_id: local-dependencies-world
    summary: Consult the local Aurelia world shaped by explicit AppRoot dependencies.
  - regime_id: local-dependencies-after-removal
    summary: Consult the same local dependency world after a mutation removes a contributor.
  - regime_id: local-template-without-registration-path
    summary: Consult a local template world where tag use exists without a closed registration path.
  - regime_id: missing-registration-path
    summary: Trace the absence of a registration path for an otherwise recognized surface.
  - regime_id: activation-dependency-walk
    summary: Trace an activation blocker through DI dependency requirements.
  - regime_id: configuration-contributed-root
    summary: Consult a world widened by exported configuration contribution.
  - regime_id: direct-export-after-mutation
    summary: Resolve an export after a mutation while keeping the declaration-world burden fixed.

fixture_subject_kind_hints:
  - kind_hint: custom-element
    summary: Export or declaration that closes on a custom-element resource family.
  - kind_hint: interface-symbol-key
    summary: Export or declaration that closes on a compile-time interface-symbol DI key.
  - kind_hint: registry-like-export
    summary: Export that behaves like a registry or configuration surface.
  - kind_hint: configuration-registry
    summary: Exported configuration object or function that shapes a consulted world.

derivation_subject_kind_hints:
  - kind_hint: export-surface
    summary: Export-addressable subject used as request ingress for derivation scenarios.
  - kind_hint: custom-element-owner-surface
    summary: Resolved Aurelia owner surface for a custom-element declaration.

resolution_statuses:
  - single
  - ambiguous
  - unresolved
