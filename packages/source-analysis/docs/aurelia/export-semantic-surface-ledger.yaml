schema_version: v0alpha1
ledger_id: aurelia-export-semantic-surface-ledger
title: Aurelia Export Semantic Surface Ledger
purpose: >
  Historical source-analysis ledger for what an export-addressable surface can
  mean once a TypeScript export lens is combined with Aurelia declaration,
  admission, registration-world, and DI/resource semantics.
status: provisional
derivation_posture:
  mode: historical-local-ledger
  notes:
    - >
      This ledger is intentionally export-lens-shaped. Live Atlas grounding now
      comes from auLink and framework source rather than the retired static
      packet bundle.
    - >
      The ledger therefore keeps the module/export side thin and uses Aurelia
      authority to describe the semantic meanings that an export may feed.
    - >
      Families marked `closed` were well-supported by the historical local
      grounding. Families marked `provisional` are useful local syntheses that
      still need more grounding or fixture pressure.


normative_rules:
  - rule_id: classify-by-value-shape-not-export-name
    status: closed
    summary: >
      Module export analysis classifies export entries by value shape, not by the
      export key string.
  - rule_id: export-analysis-is-declaration-adjacent
    status: closed
    summary: >
      Export analysis is declaration/admission-adjacent authority. It is not by
      itself admission into the active semantic world.
  - rule_id: resource-key-space-is-distinct
    status: closed
    summary: >
      Resource keys are semantically distinct from generic DI keys even when the
      same export participates in both worlds.
  - rule_id: do-not-collapse-binding-command-and-attribute-pattern
    status: closed
    summary: >
      Binding commands and attribute patterns are both compiler-facing, but they
      do not share the same carrier family.
  - rule_id: registry-export-is-not-automatically-a-resource-definition
    status: closed
    summary: >
      Registry-like exports widen declaration or vocabulary worlds, but they are
      not automatically resource-definition carriers.
  - rule_id: consulted-world-is-separate-from-current-world
    status: closed
    summary: >
      Recognition, admissibility, and current-world activity must remain separate
      result axes under an export lens.

module_bridge:
  analyzed_export_carriers:
    analyzed_module:
      summary: raw module object plus analyzed item inventory
      status: closed
    module_item:
      summary: one export entry with classification fields
      status: closed
      fields:
        - id: key
          summary: export entry key
        - id: value
          summary: raw exported value
        - id: isRegistry
          summary: registry-like shape exposed through a callable register surface
        - id: isConstructable
          summary: constructable or class-like value shape
        - id: definition
          summary: recovered resource-definition metadata when present
  classification_law:
    object_exports:
      isRegistry: conditional
      isConstructable: false
      definition: absent
    function_exports:
      isRegistry: conditional
      isConstructable: conditional
      definition: conditional
    primitive_like_exports:
      analyzed_item_inventory: ignored

key_spaces:
  - key_family_id: property-key
    status: closed
    summary: property-key identity in the ordinary DI key space
  - key_family_id: object-key
    status: closed
    summary: object identity used directly as a DI key
  - key_family_id: constructable-key
    status: closed
    summary: constructable or class identity used as a DI key
  - key_family_id: interface-symbol-key
    status: closed
    summary: interface-symbol key created through interface construction helpers
  - key_family_id: resolver-key
    status: closed
    summary: resolver object identity spent directly as a key-like registration surface
  - key_family_id: resource-key
    status: closed
    summary: resource-key identity in the framework resource key space

lookup_regimes:
  - lookup_regime_id: generic-di-ancestor-walk
    status: closed
    summary: generic DI lookup walks ancestors until root
  - lookup_regime_id: resource-current-plus-root
    status: closed
    summary: resource lookup checks current container first, then root
  - lookup_regime_id: own-only-resource
    status: closed
    summary: helper-scoped own-container visibility stays local to the current world
  - lookup_regime_id: registry-local-only
    status: closed
    summary: registry consultation stays local to the owning registry world
  - lookup_regime_id: owner-bounded-local
    status: closed
    summary: consultation stays inside one owner-local template or declaration world
  - lookup_regime_id: analyzed-module-selection
    status: closed
    summary: consultation happens over an analyzed export world before later active registration

carrier_families:
  - carrier_family_id: resource-definition
    status: closed
    summary: >
      Shared ResourceDefinition carrier family with resource key space,
      alias-aware registration, and kind-level admission helpers.
  - carrier_family_id: registrable-metadata-registry
    status: closed
    summary: >
      Registrable-metadata admission path used by compiler-facing parser
      registries such as attribute patterns.
  - carrier_family_id: analyzed-module-bridge
    status: local-derived
    summary: >
      Local bridge category for module-export analysis carriers that feed later
      admission or consumer-specific selection without being direct world truth.

detail_lenses:
  - lens_id: export-shape
    summary: classify by module-item shape and bridge fields
  - lens_id: carrier-family
    summary: identify the carrier family, if any, spent by the export
  - lens_id: kind
    summary: identify resource or semantic kind when available
  - lens_id: key-space
    summary: identify whether the export participates in generic DI or resource key space
  - lens_id: naming-surfaces
    summary: surface canonical name, built-in alias, generated alias, or resource key
  - lens_id: registration-path
    summary: explain how the export widens or feeds declaration/admission worlds
  - lens_id: consulted-world
    summary: state which declaration or registry world was actually consulted
  - lens_id: world-status
    summary: distinguish recognized, admissible, and current-world active
  - lens_id: consumer-selection-policy
    summary: explain consumer-specific selection above the analyzed export world
  - lens_id: witness-basis
    summary: expose declaration witness, support bundle, and open boundary basis

request_profiles:
  - profile_id: resolve-export-surface
    operation: resolve
    summary: close one export-addressable target
  - profile_id: inspect-export-classification
    operation: inspect
    summary: inspect module-item shape, carrier family, and semantic kind
  - profile_id: trace-export-admission-bridge
    operation: trace
    summary: trace how an export feeds declaration, registry, or admission worlds
  - profile_id: evaluate-export-world-status
    operation: evaluate
    summary: evaluate recognized, admissible, or current-world status for the export
  - profile_id: evaluate-export-keyspace
    operation: evaluate
    summary: evaluate which DI or resource key space the export participates in
  - profile_id: trace-consumer-selection
    operation: trace
    summary: trace consumer-specific selection over an analyzed export world

continuation_seeds:
  - continuation_id: inspect-kind
    summary: inspect kind-specific fields or adjunct families
  - continuation_id: trace-naming
    summary: trace canonical name, resource key, aliases, and convergence surfaces
  - continuation_id: trace-admission
    summary: trace declaration, registry, or constructor-path admission
  - continuation_id: evaluate-world-status
    summary: evaluate recognized, admissible, or current-world-active status
  - continuation_id: evaluate-lookup-regime
    summary: evaluate which lookup regime governs the export's downstream meaning
  - continuation_id: trace-consumer-policy
    summary: trace consumer-specific promotion, narrowing, or lazy selection
  - continuation_id: reroute-ts-only
    summary: reroute to a TypeScript-only export inspection when no Aurelia semantics close honestly

export_surface_families:
  - export_family_id: resource-definition-export
    status: closed
    summary: >
      Export whose analyzed module item closes on a resource-definition-bearing
      constructable with recoverable definition metadata.
    module_item_shape:
      isConstructable: true
      definition: present
      isRegistry: optional
    carrier_family: resource-definition
    resource_archetypes:
      - custom-element
      - custom-attribute
      - template-controller
      - value-converter
      - binding-behavior
      - binding-command
    domain_policy_by_kind:
      runtime-visible:
        - custom-element
        - custom-attribute
        - template-controller
        - value-converter
        - binding-behavior
      compiler-root-only:
        - binding-command
    key_spaces:
      - constructable-key
      - resource-key
    request_profiles:
      - resolve-export-surface
      - inspect-export-classification
      - trace-export-admission-bridge
      - evaluate-export-world-status
    response_lenses:
      - export-shape
      - carrier-family
      - kind
      - key-space
      - naming-surfaces
      - consulted-world
      - world-status
      - witness-basis
    continuation_seeds:
      - inspect-kind
      - trace-naming
      - trace-admission
      - evaluate-world-status
      - evaluate-lookup-regime
    non_collapse_rules:
      - do not flatten runtime-visible kinds and compiler-root-only kinds
      - do not treat definition presence as proof of current-world activity

  - export_family_id: registry-like-export
    status: provisional
    summary: >
      Export whose analyzed module item exposes a registry-like register surface
      or otherwise feeds registration-world construction rather than direct
      resource-definition closure.
    module_item_shape:
      isRegistry: true
      isConstructable: optional
      definition: optional
    carrier_family:
      primary: analyzed-module-bridge
      possible_specialization:
        - registrable-metadata-registry
    registry_archetypes:
      - aggregate-bundle-registry
      - customized-default-registry
      - composed-configuration-layer
      - generated-syntax-registry
      - staged-builder-registry
      - lifecycle-attached-configuration
      - alias-or-admission-registry
    output_classes:
      - translation-resource-map
      - injected-member-families
      - child-world-overlay
      - route-config-carriers
      - route-local-resource-admission
      - dynamic-registrations
    key_spaces:
      - object-key
      - resolver-key
    request_profiles:
      - inspect-export-classification
      - trace-export-admission-bridge
      - evaluate-export-world-status
    response_lenses:
      - export-shape
      - carrier-family
      - registration-path
      - consulted-world
      - world-status
      - witness-basis
    continuation_seeds:
      - trace-admission
      - inspect-kind
      - evaluate-world-status
      - trace-consumer-policy
    non_collapse_rules:
      - do not collapse registry-like exports into ordinary resource definitions
      - generated syntax and lifecycle attachment must remain visible when present

  - export_family_id: constructable-nondefinition-export
    status: provisional
    summary: >
      Constructable export with no recovered resource-definition metadata. This
      may still be meaningful as a generic DI key, implementation basis, or a
      consumer-specific candidate above the analyzed export world.
    module_item_shape:
      isConstructable: true
      definition: absent
      isRegistry: optional
    carrier_family:
      primary: analyzed-module-bridge
    key_spaces:
      - constructable-key
    consumer_specific_meanings:
      - generic-di-key
      - implementation-basis-for-resolver-strategy
      - raw-constructable-custom-element-candidate-in-lazy-selection
    request_profiles:
      - resolve-export-surface
      - inspect-export-classification
      - trace-consumer-selection
      - evaluate-export-keyspace
    response_lenses:
      - export-shape
      - key-space
      - consumer-selection-policy
      - witness-basis
    continuation_seeds:
      - evaluate-lookup-regime
      - trace-consumer-policy
      - reroute-ts-only
    non_collapse_rules:
      - absence of definition metadata is not automatic no-claim for all consumers
      - consumer-specific promotion must remain above the module bridge

  - export_family_id: interface-symbol-key-export
    status: closed
    summary: >
      Exported interface-symbol key created through interface construction
      helpers and spent in the generic DI key world.
    module_item_shape:
      analyzed_export_bridge: not-guaranteed
      note: semantic meaning may arise even without resource-definition closure
    key_spaces:
      - interface-symbol-key
    request_profiles:
      - resolve-export-surface
      - evaluate-export-keyspace
      - trace-export-admission-bridge
    response_lenses:
      - key-space
      - consulted-world
      - witness-basis
    continuation_seeds:
      - evaluate-lookup-regime
      - trace-admission
    non_collapse_rules:
      - interface-symbol keys are not resource keys
      - default registration behavior must remain separate from plain identity

  - export_family_id: resolver-export
    status: closed
    summary: >
      Exported resolver surface or resolver-like value spent directly as a
      key-like registration surface in the generic DI world.
    module_item_shape:
      analyzed_export_bridge: optional
    key_spaces:
      - resolver-key
    resolver_strategies:
      - instance
      - singleton
      - transient
      - callback
      - alias
      - array-aggregation
    helper_read_modifiers:
      - all
      - lazy
      - optional
      - factory
      - own
      - resource
      - optionalResource
      - allResources
      - newInstanceForScope
      - newInstanceOf
    request_profiles:
      - resolve-export-surface
      - evaluate-export-keyspace
      - trace-export-admission-bridge
    response_lenses:
      - key-space
      - consulted-world
      - consumer-selection-policy
      - witness-basis
    continuation_seeds:
      - evaluate-lookup-regime
      - trace-consumer-policy
    non_collapse_rules:
      - helper modifiers do not create new base resolver strategies
      - resolver-key meaning stays in generic DI unless additional resource semantics close

  - export_family_id: resource-key-export
    status: provisional
    summary: >
      Exported value that is semantically a framework resource key rather than a
      generic DI key.
    module_item_shape:
      analyzed_export_bridge: optional
    key_spaces:
      - resource-key
    request_profiles:
      - resolve-export-surface
      - evaluate-export-keyspace
      - evaluate-export-world-status
    response_lenses:
      - key-space
      - naming-surfaces
      - consulted-world
      - world-status
    continuation_seeds:
      - evaluate-lookup-regime
      - trace-naming
      - evaluate-world-status
    non_collapse_rules:
      - resource keys are string-encoded but not equivalent to generic property keys
      - resource-key participation does not by itself prove current-world activity

  - export_family_id: compiler-vocabulary-export
    status: closed
    summary: >
      Export-addressable surface whose semantic weight is primarily in compile-time
      vocabulary admission rather than runtime resource visibility.
    member_kinds:
      - binding-command
      - attribute-pattern
    carrier_family_by_kind:
      binding-command: resource-definition
      attribute-pattern: registrable-metadata-registry
    domain_policy: compiler-root-only
    request_profiles:
      - inspect-export-classification
      - trace-export-admission-bridge
      - evaluate-export-world-status
    response_lenses:
      - kind
      - carrier-family
      - registration-path
      - consulted-world
      - world-status
      - witness-basis
    continuation_seeds:
      - trace-admission
      - evaluate-world-status
      - trace-naming
    non_collapse_rules:
      - binding-command and attribute-pattern should not be collapsed merely because both serve compiler syntax
      - command admission and pattern admission have different mechanisms and open-state behavior

  - export_family_id: ignored-primitive-like-export
    status: closed
    summary: >
      Primitive-like export ignored by the analyzed item inventory for Aurelia
      declaration/admission bridging.
    module_item_shape:
      analyzed_item_inventory: ignored
    request_profiles:
      - inspect-export-classification
    response_lenses:
      - export-shape
      - witness-basis
    continuation_seeds:
      - reroute-ts-only
    non_collapse_rules:
      - ignored by the Aurelia declaration bridge does not imply useless to TypeScript-only consumers

open_questions:
  - question_id: export-topology-closure
    status: open
    summary: >
      This ledger does not yet close direct export topology variants such as
      named export, re-export, barrel, or star export. That belongs to the
      TypeScript-side fixture matrix rather than Atlas alone.
  - question_id: stronger-registry-family-taxonomy
    status: open
    summary: >
      Registry-like exports are semantically rich, but the current local ledger
      still groups several constructor-output archetypes under one export family.
  - question_id: explicit-resource-key-export-fixtures
    status: open
    summary: >
      Resource-key exports are clearly real in Atlas law, but fixture pressure is
      still needed to decide how often they should appear as first-class export
      scenarios in this repo.
