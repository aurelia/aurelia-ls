schema_version: v0alpha1
title: Resource Kind Carrier Index
excerpt_status: local-port

carrier_families:
  resource-definition:
    summary: >
      Shared ResourceDefinition carrier family with resource key space,
      alias-aware registration, and kind-level admission helpers.
  registrable-metadata-registry:
    summary: >
      Registrable-metadata admission path used by compiler-facing parser
      registries such as attribute patterns.

kinds:
  - kind_id: custom-element
    carrier_family: resource-definition
    domain: runtime-html
    root_only: false
    notes:
      - richest runtime definition surface
      - conventions and template-local declaration surfaces are adjacent here

  - kind_id: custom-attribute
    carrier_family: resource-definition
    domain: runtime-html
    root_only: false
    notes:
      - template-controller is a specialized custom-attribute declaration path

  - kind_id: template-controller
    carrier_family: resource-definition
    domain: runtime-html
    root_only: false
    notes:
      - shares carrier with custom-attribute

  - kind_id: value-converter
    carrier_family: resource-definition
    domain: runtime-html
    root_only: false

  - kind_id: binding-behavior
    carrier_family: resource-definition
    domain: runtime-html
    root_only: false

  - kind_id: binding-command
    carrier_family: resource-definition
    domain: compiler
    root_only: true
    root_only_enforced_by_framework: false
    notes:
      - intended product encoding should keep it compiler-root-only

  - kind_id: attribute-pattern
    carrier_family: registrable-metadata-registry
    domain: compiler
    root_only: true
    root_only_enforced_by_framework: false
    notes:
      - compiler syntax carrier, not a ResourceDefinition family
      - should not be conflated with binding-command merely because both are compiler-facing
