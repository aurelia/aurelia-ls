schema_version: v0alpha1
title: Declaration World Registration Pattern Families
excerpt_status: local-port

extended_output_classes:
  - output_class_id: translation-resource-map
    summary: >
      Data or resource maps that feed generated translation worlds rather than
      ordinary DI service registration alone.
  - output_class_id: reducer-callback
    summary: >
      Reducer-style or action-handler callbacks whose presence is explicit even
      when runtime consequences remain qualified.
  - output_class_id: ambient-library-side-effect
    summary: Registration that also mutates non-container library state.
  - output_class_id: root-stack-membership
    summary: >
      A composition witness that one constructor family participates in a
      heterogeneous root stack.
  - output_class_id: route-shell-admission
    summary: Admission of one routed root shell or viewport-bearing wrapper.
  - output_class_id: route-component-admission
    summary: Admission of route component worlds or child route members.
  - output_class_id: route-local-resource-admission
    summary: >
      Resource availability widened only inside one route or owner-bounded
      template world.
  - output_class_id: route-config-carriers
    summary: >
      Normalized route-config, child-route overlay, redirect, and fallback
      carriers that widen a routed declaration world.
  - output_class_id: child-world-overlay
    summary: >
      Child or shell-local settings and world members whose lookup law differs
      from the root.
  - output_class_id: injected-member-families
    summary: >
      Attribute patterns, binding commands, instruction families, renderers, or
      similar injected declaration participants.
  - output_class_id: dynamic-composition-shell
    summary: >
      A late-bound shell world such as au-compose that carries its own lookup
      boundary.
  - output_class_id: dynamic-registrations
    summary: >
      Registrations introduced from runtime callback execution rather than from
      a closed static constructor surface.
  - output_class_id: multiple-root-worlds
    summary: >
      Several explicit root-entry worlds that coexist without collapsing to one
      canonical root.

underclosure_reasons:
  - reason_id: callback-opaque-payload
    summary: >
      Callback or builder payload structure is only partly visible without
      deeper interpretation of user code.
  - reason_id: admitted-regime-enablement-dependent
    summary: >
      Family closure depends on whether a conventions or preprocess regime is
      actually admitted for the consulted world.
  - reason_id: lifecycle-gate-dependent
    summary: Membership or activity depends on lifecycle slot execution order.
  - reason_id: runtime-topology-dependent
    summary: >
      Closure depends on runtime container or world topology rather than on
      registration syntax alone.
  - reason_id: render-branch-dependent
    summary: >
      Current-world activity depends on hydration, render, or route-materialization
      branching.
  - reason_id: dynamic-late-binding
    summary: >
      The final member set or lookup boundary is chosen only at late
      composition time.
